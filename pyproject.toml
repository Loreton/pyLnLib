[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pyLnLib"
version = "0.1.0"
description = "Libreria personale di utility Python"
authors = [
    { name="Loreto Notarantonio" }
]
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
dependencies = [
    "PyYAML>=6.0.2"
]

[tool.setuptools.packages.find]
where = ["src"]